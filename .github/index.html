<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost-Net: Groups & Channels</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0b0e11; --panel: #15191c; --acc: #00a884; --txt: #f1f1f1; }
        body { background: var(--bg); color: var(--txt); font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        
        /* Боковая панель */
        .sidebar { width: 280px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; }
        .sidebar header { padding: 15px; border-bottom: 1px solid #333; font-weight: bold; }
        .list { flex: 1; overflow-y: auto; }
        .item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; font-size: 14px; }
        .item:hover { background: #1e2428; }

        /* Чат */
        .main { flex: 1; display: flex; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; font-size: 14px; }
        .m { align-self: flex-end; background: #005c4b; }
        .t { align-self: flex-start; background: #262d31; }

        .input-bar { padding: 15px; background: var(--panel); display: flex; gap: 10px; }
        input, button { padding: 10px; border-radius: 5px; border: 1px solid #333; background: #2a2f32; color: white; outline: none; }
        button { background: var(--acc); border: none; font-weight: bold; cursor: pointer; }

        /* Окно входа */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .box { background: var(--panel); padding: 30px; border-radius: 10px; width: 300px; text-align: center; }
    </style>
</head>
<body>

<div id="modal">
    <div class="box">
        <h3>GhostID Login</h3>
        <input type="text" id="my-id" placeholder="Ваш ID" style="width: 90%; margin-bottom: 10px;"><br>
        <input type="password" id="master-pass" placeholder="Ваш пароль" style="width: 90%; margin-bottom: 20px;"><br>
        <button onclick="startApp()" style="width: 100%">Войти</button>
    </div>
</div>

<div class="sidebar">
    <header>Чаты и Группы</header>
    <div class="list" id="rooms-list">
        <div class="item" onclick="switchRoom('main')"># Общий канал</div>
    </div>
    <div style="padding: 10px; border-top: 1px solid #333;">
        <input type="text" id="new-room-name" placeholder="Имя группы" style="width: 70%; font-size: 12px;">
        <button onclick="createRoom()" style="padding: 5px;">+</button>
    </div>
</div>

<div class="main">
    <header style="padding: 15px; background: var(--panel); border-bottom: 1px solid #333;">
        Чат: <span id="current-room-title">main</span>
    </header>
    <div id="messages"></div>
    <div class="input-bar">
        <input type="text" id="msg-input" placeholder="Сообщение...">
        <button onclick="sendMsg()">➤</button>
        <button onclick="startCall()" style="background: #34b7f1">📞</button>
    </div>
</div>

<script>
    const GH_TOKEN = "ТВОЙ_GITHUB_TOKEN"; 
    const REPO = "ТВОЙ_НИК/РЕПО";
    
    let myId, masterPass, currentRoom = 'main', peer;
    let knownRooms = { 'main': { type: 'channel', key: 'public' } };

    async function startApp() {
        myId = document.getElementById('my-id').value;
        masterPass = document.getElementById('master-pass').value;
        if(!myId || !masterPass) return alert("Заполни данные!");

        peer = new Peer(myId);
        document.getElementById('modal').style.display = 'none';
        
        peer.on('call', async (call) => {
            const s = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
            call.answer(s);
            call.on('stream', rs => renderVideo(rs));
        });

        loadHistory();
        setInterval(loadHistory, 4000);
    }

    async function createRoom() {
        const name = document.getElementById('new-room-name').value;
        const pass = prompt("Введите пароль для группы (или оставьте пустым для админ-подтверждения):");
        
        // Создаем системное сообщение о новой группе
        const info = { name, admin: myId, passProtected: !!pass, pass: pass || 'admin_only' };
        await sendRawMsg('SYSTEM_CREATE', JSON.stringify(info));
        alert("Группа создана!");
    }

    async function sendMsg() {
        const text = document.getElementById('msg-input').value;
        if(!text) return;
        
        const payload = JSON.stringify({ s: myId, t: text, r: currentRoom, d: Date.now() });
        const enc = CryptoJS.AES.encrypt(payload, masterPass).toString();

        await fetch(`https://api.github.com/repos/${REPO}/issues/1/comments`, {
            method: 'POST',
            headers: { 'Authorization': `token ${GH_TOKEN}` },
            body: JSON.stringify({ body: `MSG:${currentRoom}:${enc}` })
        });
        document.getElementById('msg-input').value = '';
        loadHistory();
    }

    async function sendRawMsg(type, data) {
        await fetch(`https://api.github.com/repos/${REPO}/issues/1/comments`, {
            method: 'POST',
            headers: { 'Authorization': `token ${GH_TOKEN}` },
            body: JSON.stringify({ body: `${type}:${data}` })
        });
    }

    async function loadHistory() {
        const res = await fetch(`https://api.github.com/repos/${REPO}/issues/1/comments`, {
            headers: { 'Authorization': `token ${GH_TOKEN}` }
        });
        const comments = await res.json();
        const chat = document.getElementById('messages');
        chat.innerHTML = '';

        comments.forEach(c => {
            if(c.body.startsWith(`MSG:${currentRoom}:`)) {
                const raw = c.body.split(`MSG:${currentRoom}:`)[1];
                try {
                    const dec = JSON.parse(CryptoJS.AES.decrypt(raw, masterPass).toString(CryptoJS.enc.Utf8));
                    const d = document.createElement('div');
                    d.className = `msg ${dec.s === myId ? 'm' : 't'}`;
                    d.innerHTML = `<small>${dec.s}</small><br>${dec.t}`;
                    chat.appendChild(d);
                } catch(e) {}
            }
            // Логика обнаружения новых комнат
            if(c.body.startsWith('SYSTEM_CREATE:')) {
                const info = JSON.parse(c.body.split('SYSTEM_CREATE:')[1]);
                if(!knownRooms[info.name]) {
                    addRoomToList(info);
                }
            }
        });
    }

    function addRoomToList(info) {
        knownRooms[info.name] = info;
        const div = document.createElement('div');
        div.className = 'item';
        div.innerText = (info.passProtected ? '🔒 ' : '👥 ') + info.name;
        div.onclick = () => {
            if(info.passProtected) {
                const p = prompt("Введите пароль группы:");
                if(p !== info.pass) return alert("Неверно!");
            } else if(info.admin !== myId) {
                if(!confirm("Отправить запрос админу на вход?")) return;
                sendRawMsg('REQ_JOIN', JSON.stringify({ from: myId, room: info.name, to: info.admin }));
                return;
            }
            switchRoom(info.name);
        };
        document.getElementById('rooms-list').appendChild(div);
    }

    function switchRoom(id) {
        currentRoom = id;
        document.getElementById('current-room-title').innerText = id;
        loadHistory();
    }

    function renderVideo(stream) {
        const v = document.createElement('video');
        v.srcObject = stream; v.autoplay = true; v.style.width="200px";
        document.getElementById('messages').appendChild(v);
    }
</script>
</body>
</html>
