name: GhostNet-PC-Fixed-Final
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build App Files
        run: |
          npm install -g nativefier
          # Собираем без иконки в Nativefier, чтобы не было ошибок 404
          # Иконку мы поставим в самом установщике
          nativefier "file://${{ github.workspace }}/index.html" `
            --name "GhostNet" `
            --platform "windows" `
            --arch "x64" `
            --single-instance `
            --file-protocols `
            --maximize `
            --overwrite

      - name: Create Russian Installer
        shell: powershell
        run: |
          # Создаем файл настроек для инсталлятора БЕЗ собаки (@), чтобы не было ошибок
          $issContent = "[Setup]`n" +
          "AppName=GhostNet`n" +
          "AppVersion=1.0`n" +
          "DefaultDirName={autopf}\GhostNet`n" +
          "DefaultGroupName=GhostNet`n" +
          "OutputDir=.`n" +
          "OutputBaseFilename=GhostNet_Setup`n" +
          "Compression=lzma`n" +
          "SolidCompression=yes`n" +
          "Languages: russian`n" +
          "MessagesFile: compiler:Languages\Russian.isl`n`n" +
          "[Files]`n" +
          "Source: `"GhostNet-win32-x64\*`"; DestDir: `"{app}`"; Flags: recursesubdirs createallsubdirs`n`n" +
          "[Tasks]`n" +
          "Name: `"desktopicon`"; Description: `"{cm:CreateDesktopIcon}`"; GroupDescription: `"{cm:AdditionalIcons}`"`n`n" +
          "[Icons]`n" +
          "Name: `"{group}\GhostNet`"; Filename: `"{app}\GhostNet.exe`"`n" +
          "Name: `"{commondesktop}\GhostNet`"; Filename: `"{app}\GhostNet.exe`"; Tasks: desktopicon`n`n" +
          "[Run]`n" +
          "Filename: `"{app}\GhostNet.exe`"; Description: `"{cm:LaunchProgram,GhostNet}`"; Flags: nowait postinstall skipifsilent"

          $issContent | Out-File -FilePath installer.iss -Encoding utf8
          
          # Запуск компилятора
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload Final EXE
        uses: actions/upload-artifact@v4
        with:
          name: GhostNet-PC-Installer
          path: GhostNet_Setup.exe
