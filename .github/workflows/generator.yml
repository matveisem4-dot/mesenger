name: GhostNet-PC-Perfect
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build Files
        run: |
          npm install -g nativefier
          # Собираем приложение
          nativefier "file://${{ github.workspace }}/index.html" `
            --name "GhostNet" `
            --platform "windows" `
            --arch "x64" `
            --single-instance `
            --file-protocols `
            --overwrite

      - name: Create Russian Installer with Desktop Icon
        shell: powershell
        run: |
          # Этот скрипт делает установщик на русском языке
          $iss = @"
          [Setup]
          AppName=GhostNet
          AppVersion=1.0
          AppPublisher=GhostNet Team
          DefaultDirName={autopf}\GhostNet
          DefaultGroupName=GhostNet
          OutputDir=.
          OutputBaseFilename=GhostNet_Setup
          Compression=lzma
          SolidCompression=yes
          Languages: russian
          MessagesFile: compiler:Languages\Russian.isl

          [Files]
          Source: "GhostNet-win32-x64\*"; DestDir: "{app}"; Flags: recursesubdirs createallsubdirs

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"

          [Icons]
          Name: "{group}\GhostNet"; Filename: "{app}\GhostNet.exe"
          # Восклицательный знак перед {commondesktop} создает ярлык на рабочем столе
          Name: "{commondesktop}\GhostNet"; Filename: "{app}\GhostNet.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\GhostNet.exe"; Description: "{cm:LaunchProgram,GhostNet}"; Flags: nowait postinstall skipifsilent
          "@
          $iss | Out-File -FilePath installer.iss -Encoding utf8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload Finished EXE
        uses: actions/upload-artifact@v4
        with:
          name: GhostNet-PC-Installer
          path: GhostNet_Setup.exe
