name: Windows-Perfect-Installer
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Nativefier
        run: npm install -g nativefier

      - name: Build App
        run: |
          # Используем --file-protocols для исправления белого экрана
          nativefier "file://${{ github.workspace }}/index.html" `
            --name "GhostNet" `
            --platform "windows" `
            --arch "x64" `
            --single-instance `
            --file-download-options '{"saveAs": true}' `
            --inject "custom-fix.js" `
            --overwrite
        # Создаем микро-фикс для путей, если нужно
        continue-on-error: true

      - name: Create One-File Installer (Inno Setup)
        shell: powershell
        run: |
          $iss = @"
          [Setup]
          AppName=GhostNet
          AppVersion=1.0
          DefaultDirName={autopf}\GhostNet
          DefaultGroupName=GhostNet
          OutputDir=.
          OutputBaseFilename=GhostNet_Setup
          Compression=lzma
          SolidCompression=yes
          DisableDirPage=yes
          PrivilegesRequired=admin

          [Files]
          Source: "GhostNet-win32-x64\*"; DestDir: "{app}"; Flags: recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\GhostNet"; Filename: "{app}\GhostNet.exe"
          Name: "{commondesktop}\GhostNet"; Filename: "{app}\GhostNet.exe"
          "@
          $iss | Out-File -FilePath installer.iss -Encoding utf8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload Single EXE
        uses: actions/upload-artifact@v4
        with:
          name: GhostNet-Windows-Installer
          path: GhostNet_Setup.exe
