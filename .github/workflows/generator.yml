name: Windows-Single-EXE-Builder
on: [push, workflow_dispatch]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Nativefier
        run: npm install -g nativefier

      - name: Create App
        run: |
          # Собираем приложение из твоего файла
          # --internal-urls позволяет не открывать новые окна браузера
          nativefier "file://${{ github.workspace }}/index.html" `
            --name "GhostNet" `
            --platform "windows" `
            --arch "x64" `
            --single-instance `
            --internal-urls ".*" `
            --overwrite
            
      - name: Pack to Single EXE
        shell: powershell
        run: |
          # Мы берем папку с билдом и создаем один архив, 
          # но переименовываем его в .exe (или оставляем ZIP, если хочешь именно один файл)
          # Самый чистый вариант для GitHub - это Portable ZIP, внутри которого один EXE
          Compress-Archive -Path "GhostNet-win32-x64\*" -DestinationPath "GhostNet_Installer.zip"

      - name: Upload Finished EXE
        uses: actions/upload-artifact@v4
        with:
          name: GhostNet-Windows-App
          path: GhostNet_Installer.zip
