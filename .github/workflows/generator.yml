name: Ultimate-Ghost-Builder
on: [push, workflow_dispatch]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Nativefier
        run: npm install -g nativefier
      - name: Create EXE
        run: |
          nativefier --name "GhostNet" --platform "windows" --arch "x64" "file://${{ github.workspace }}/index.html" --single-instance
          Compress-Archive -Path "GhostNet-win32-x64" -DestinationPath "GhostNet-Windows.zip"
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: GhostNet-EXE
          path: GhostNet-Windows.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Вернем 17, она стабильнее для Capacitor
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Prepare Project
        run: |
          npm init -y
          npm install @capacitor/cli @capacitor/core @capacitor/android
          mkdir www
          cp index.html www/
          
      - name: Initialize Capacitor
        run: |
          npx cap init GhostNet com.ghost.app --web-dir www
          npx cap add android
          
      - name: Fix Duplicate Classes
        # Этот костыль удаляет конфликтующие библиотеки Kotlin перед сборкой
        run: |
          cd android
          echo "configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22' } }" >> build.gradle
          
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GhostNet-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
