name: Ultimate-Ghost-Builder
on: [push, workflow_dispatch]

jobs:
  # Со сборкой Windows всё Ок, оставляем как есть
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Nativefier
        run: npm install -g nativefier
      - name: Create EXE
        run: |
          nativefier --name "GhostNet" --platform "windows" --arch "x64" "file://${{ github.workspace }}/index.html" --single-instance
          Compress-Archive -Path "GhostNet-win32-x64" -DestinationPath "GhostNet-Windows.zip"
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: GhostNet-EXE
          path: GhostNet-Windows.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Переходим на Java 21, так как логи требуют именно её
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Prepare Project
        run: |
          npm init -y
          npm install @capacitor/cli @capacitor/core @capacitor/android
          mkdir -p www
          cp index.html www/
          
      - name: Initialize Capacitor
        run: |
          npx cap init GhostNet com.ghost.app --web-dir www
          npx cap add android
          
      - name: Hard-Fix Android Config
        run: |
          cd android
          # Явно прописываем Java 21 и исправляем конфликты версий
          echo "org.gradle.java.home=${JAVA_HOME_21_X64}" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          # Принудительно ставим версию Kotlin, которая не глючит
          sed -i 's/kotlin_version = .*/kotlin_version = "1.9.10"/' build.gradle
          
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GhostNet-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
