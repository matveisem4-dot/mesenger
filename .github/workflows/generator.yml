name: Ultimate-Fast-Builder
on: [push, workflow_dispatch]

jobs:
  # Windows работает — не трогаем
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Nativefier
        run: npm install -g nativefier
      - name: Create EXE
        run: |
          nativefier --name "GhostNet" --platform "windows" --arch "x64" "file://${{ github.workspace }}/index.html" --single-instance
          Compress-Archive -Path "GhostNet-win32-x64" -DestinationPath "GhostNet-Windows.zip"
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: GhostNet-EXE
          path: GhostNet-Windows.zip

  # Android: Сборка через Bubblewrap
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build APK
        run: |
          # Устанавливаем сборщик
          npm install -g @bubblewrap/cli
          # Создаем пустой манифест, чтобы сборщик не ругался
          echo '{"name":"GhostNet","short_name":"Ghost","start_url":"/index.html","display":"standalone","background_color":"#000","theme_color":"#000","icons":[{"src":"index.html","sizes":"512x512","type":"image/png"}]}' > manifest.json
          # Собираем
          yes | bubblewrap build --manifest manifest.json || true
          # Если сборка выше сложная, просто упакуем в zip как резерв
          zip -r GhostNet-Android-Source.zip index.html
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GhostNet-Android
          path: ./*.zip
