name: GhostNet-PC-Perfect-Final
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build App Files
        run: |
          npm install -g nativefier
          nativefier "file://${{ github.workspace }}/index.html" `
            --name "GhostNet" `
            --platform "windows" `
            --arch "x64" `
            --single-instance `
            --file-protocols `
            --maximize `
            --overwrite

      - name: Create Russian Installer
        shell: powershell
        run: |
          # Формируем правильный ISS файл
          $iss = @"
          [Setup]
          AppName=GhostNet
          AppVersion=1.0
          DefaultDirName={autopf}\GhostNet
          DefaultGroupName=GhostNet
          OutputDir=.
          OutputBaseFilename=GhostNet_Setup
          Compression=lzma
          SolidCompression=yes

          [Languages]
          Name: "russian"; MessagesFile: "compiler:Languages\Russian.isl"

          [Files]
          Source: "GhostNet-win32-x64\*"; DestDir: "{app}"; Flags: recursesubdirs createallsubdirs

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"

          [Icons]
          Name: "{group}\GhostNet"; Filename: "{app}\GhostNet.exe"
          Name: "{commondesktop}\GhostNet"; Filename: "{app}\GhostNet.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\GhostNet.exe"; Description: "{cm:LaunchProgram,GhostNet}"; Flags: nowait postinstall skipifsilent
          "@
          
          # Сохраняем строго в UTF-8 с BOM, чтобы Inno Setup не подавился кириллицей
          [System.IO.File]::WriteAllText("$(Get-Location)\installer.iss", $iss, [System.Text.Encoding]::UTF8)
          
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload Final EXE
        uses: actions/upload-artifact@v4
        with:
          name: GhostNet-PC-Installer
          path: GhostNet_Setup.exe
