name: Ultimate-Fast-Builder
on: [push, workflow_dispatch]

jobs:
  # СБОРКА ДЛЯ WINDOWS (EXE) - Работает стабильно
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Nativefier
        run: npm install -g nativefier
      - name: Create EXE
        run: |
          nativefier --name "GhostNet" --platform "windows" --arch "x64" "file://${{ github.workspace }}/index.html" --single-instance
          Compress-Archive -Path "GhostNet-win32-x64" -DestinationPath "GhostNet-Windows.zip"
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: GhostNet-EXE
          path: GhostNet-Windows.zip

  # НОВЫЙ СБОРЩИК ANDROID (БЕЗ CAPACITOR)
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Web-to-APK Tool
        run: |
          # Используем легкий инструмент упаковки
          zip -r ghostnet.zip index.html
      - name: Create APK via Action
        uses: pavi2410/Web2App@v1
        with:
          name: "GhostNet"
          url: "file://${{ github.workspace }}/index.html" # Указываем локальный файл
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GhostNet-APK
          path: ./*.apk
