name: Ultimate-Fix-APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 7.6
          cache-disabled: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build Real APK
        run: |
          # Автоматически принимаем лицензию и ставим нужную версию build-tools
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "build-tools;32.0.0"
          
          # Дальше стандартная сборка, которая уже почти получилась
          npm install -g cordova
          cordova create ghost-app com.ghost.net GhostNet
          cd ghost-app
          cordova platform add android@11.0.0 --no-telemetry
          cp ../index.html www/index.html
          cordova build android --debug --no-telemetry

      - name: Upload APK File
        uses: actions/upload-artifact@v4
        with:
          name: GhostNet-Official-APK
          path: ghost-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
