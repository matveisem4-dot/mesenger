name: Ultimate-Ghost-Builder
on: [push, workflow_dispatch]

jobs:
  # СБОРКА ДЛЯ WINDOWS (EXE)
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install Nativefier
        run: npm install -g nativefier
      
      - name: Create EXE
        # Превращаем HTML в полноценное приложение .exe
        run: |
          nativefier --name "GhostNet" --platform "windows" --arch "x64" "file://${{ github.workspace }}/index.html" --single-instance --internal-urls ".*"
          Compress-Archive -Path "GhostNet-win32-x64" -DestinationPath "GhostNet-Windows.zip"

      - name: Upload Windows App
        uses: actions/upload-artifact@v4
        with:
          name: GhostNet-EXE
          path: GhostNet-Windows.zip

  # СБОРКА ДЛЯ ANDROID (APK)
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install Tools
        run: |
          npm install -g @capacitor/cli @capacitor/core
          mkdir www
          cp index.html www/
          
      - name: Initialize Android Project
        # Создаем обертку для Android
        run: |
          npx cap init GhostNet com.ghost.app --web-dir www
          npx cap add android
          
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GhostNet-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
