name: Ultimate-Fix-APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build Real APK
        run: |
          # Устанавливаем кордову напрямую
          npm install -g cordova
          # Создаем проект во временной папке
          cordova create ghost-app com.ghost.net GhostNet
          cd ghost-app
          # Добавляем платформу
          cordova platform add android --no-telemetry
          # Копируем твой index.html в папку сборки
          cp ../index.html www/index.html
          # Запускаем сборку бинарного файла .apk
          cordova build android --debug --no-telemetry

      - name: Upload APK File
        uses: actions/upload-artifact@v4
        with:
          name: GhostNet-Official-APK
          # Указываем прямой путь к скомпилированному файлу
          path: ghost-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
