name: Super-Solid-APK-Builder
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Android APK
        # Используем упрощенный сборщик, который не требует инициализации проектов
        uses: tttstudios/as-build-action@v1.1
        with:
          project-root: .
          build-variant: debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GhostNet-APK
          path: app/build/outputs/apk/debug/*.apk
