name: 24/7 Messenger Server

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Возможность ручного запуска
  schedule:
    - cron: '0 */5 * * *' # Подстраховка: запуск каждые 5 часов

jobs:
  run-messenger:
    runs-on: windows-latest # Используем Windows для доступа к диску C:
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install express socket.io crypto-js peerjs
          # Установка дополнительных утилит для работы с сетью, если нужно

      - name: Create Data Directory on C:
        run: |
          if (!(Test-Path "C:\MessengerData")) {
            New-Item -Path "C:\MessengerData" -ItemType Directory
          }
        shell: powershell

      - name: Run Messenger Server
        env:
          SERVER_SECRET: ${{ secrets.SERVER_SECRET }} # Ключ шифрования из Secrets
          PORT: 8080
        run: |
          # Запуск сервера в фоновом режиме через PowerShell
          # Мы ограничиваем время работы шага до 5.5 часов (19800 секунд)
          $process = Start-Process node -ArgumentList "server.js" -PassThru
          Start-Sleep -Seconds 19800 
          Stop-Process $process.Id
        shell: powershell

      - name: Self-Reinstall & Restart
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Этот шаг перезапускает этот же workflow, создавая бесконечный цикл
          gh workflow run messenger.yml
        shell: bash
