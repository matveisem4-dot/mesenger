<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MaxMesh | Private Network</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --panel: rgba(23, 33, 43, 0.8);
            --accent: #00a2ff;
            --accent-glow: rgba(0, 162, 255, 0.3);
            --text: #e1e1e1;
            --text-dim: #8a8a8a;
            --in-msg: #182533;
            --out-msg: #2b5278;
            --success: #00ff88;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', sans-serif; overflow: hidden;
        }

        /* --- BACKGROUND ANIMATION --- */
        .bg-glow {
            position: fixed; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 50%, #101825 0%, #05070a 100%);
            z-index: -1;
        }

        /* --- AUTH OVERLAY --- */
        #auth-screen {
            position: fixed; inset: 0; z-index: 1000;
            background: var(--bg); display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: var(--panel); padding: 40px; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .auth-card h1 { margin-bottom: 30px; font-weight: 300; letter-spacing: 2px; }
        .auth-card input {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid #333;
            padding: 15px; border-radius: 12px; color: white; margin-bottom: 20px; outline: none;
            transition: 0.3s;
        }
        .auth-card input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        /* --- MAIN LAYOUT --- */
        .app-container { display: flex; height: 100vh; width: 100vw; opacity: 0; transition: 1s; }
        .app-active { opacity: 1; }

        /* SIDEBAR */
        .sidebar {
            width: 300px; background: var(--panel); border-right: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; backdrop-filter: blur(20px);
            transition: 0.3s ease;
        }
        .sidebar-header { padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--success); box-shadow: 0 0 10px var(--success); }
        
        .contact-list { flex: 1; overflow-y: auto; padding: 10px; }
        .contact-item {
            padding: 15px; border-radius: 15px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 15px; margin-bottom: 5px;
        }
        .contact-item:hover { background: rgba(255,255,255,0.05); }
        .contact-item.active { background: var(--out-msg); }

        /* CHAT AREA */
        .chat-main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .chat-header {
            height: 70px; background: rgba(13, 20, 29, 0.5); display: flex;
            align-items: center; padding: 0 25px; border-bottom: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }
        #messages {
            flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 12px;
            background: linear-gradient(to bottom, transparent, rgba(0,162,255,0.02));
        }
        .msg {
            max-width: 75%; padding: 12px 18px; border-radius: 18px; font-size: 15px;
            line-height: 1.4; position: relative; animation: msgSlide 0.3s ease;
        }
        @keyframes msgSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg.in { align-self: flex-start; background: var(--in-msg); border-bottom-left-radius: 4px; }
        .msg.out { align-self: flex-end; background: var(--out-msg); border-bottom-right-radius: 4px; }
        .msg-time { font-size: 10px; opacity: 0.5; margin-top: 5px; text-align: right; }

        /* INPUT BAR */
        .input-area {
            padding: 20px; background: var(--panel); display: flex; gap: 15px; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        #messageInput {
            flex: 1; background: rgba(0,0,0,0.3); border: none; padding: 15px 20px;
            border-radius: 30px; color: white; outline: none; font-size: 15px;
        }
        .btn-send {
            width: 50px; height: 50px; border-radius: 50%; background: var(--accent);
            border: none; color: white; cursor: pointer; box-shadow: 0 0 20px var(--accent-glow);
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .btn-send:hover { transform: scale(1.1); }

        /* BUTTONS */
        .btn-action {
            background: transparent; border: 1px solid var(--accent); color: var(--accent);
            padding: 8px 15px; border-radius: 10px; cursor: pointer; font-size: 13px;
            transition: 0.3s; margin-top: 10px; width: 100%;
        }
        .btn-action:hover { background: var(--accent); color: white; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -100%; height: 100%; z-index: 500; }
            .sidebar.open { left: 0; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div id="auth-screen">
        <div class="auth-card">
            <h1>MAXMESH</h1>
            <p style="color: var(--text-dim); margin-bottom: 25px;">Введите ваш уникальный Node ID</p>
            <input type="text" id="nodeId" placeholder="Напр: alpha_77">
            <button class="btn-send" style="width: 100%; border-radius: 12px;" onclick="core.init()">ПОДКЛЮЧИТЬСЯ</button>
        </div>
    </div>

    <div class="app-container" id="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="user-info">
                    <div class="status-dot"></div>
                    <div>
                        <b id="displayId">NodeID</b><br>
                        <small style="color: var(--accent);">Encrypted Mesh</small>
                    </div>
                </div>
                <button class="btn-action" onclick="core.addPeer()">+ НОВЫЙ КОНТАКТ</button>
            </div>
            <div class="contact-list" id="contactList"></div>
        </aside>

        <main class="chat-main">
            <header class="chat-header">
                <b id="chatWith">Выберите чат</b>
            </header>
            
            <div id="messages"></div>

            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Введите сообщение...">
                <button class="btn-send" onclick="core.send()">🚀</button>
            </div>
        </main>
    </div>

    <script>
        const core = {
            peer: null,
            conn: null,
            myId: '',
            activeTarget: '',
            // ЗАМЕНИ НА СВОЙ АДРЕС ИЗ YAML
            relay: 'my-secure-mesh-node.loca.lt', 

            init() {
                const id = document.getElementById('nodeId').value.trim();
                if(!id) return;
                this.myId = id;

                this.peer = new Peer(id, {
                    host: this.relay,
                    port: 443,
                    path: '/network-service',
                    secure: true
                });

                this.peer.on('open', () => {
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('app').classList.add('app-active');
                    document.getElementById('displayId').innerText = id;
                });

                this.peer.on('connection', (c) => {
                    this.conn = c;
                    this.setupConn();
                });

                this.peer.on('error', (err) => {
                    alert('Ошибка сети: ' + err.type);
                });
            },

            addPeer() {
                const target = prompt("ID собеседника:");
                if(!target) return;
                this.activeTarget = target;
                document.getElementById('chatWith').innerText = target;
                
                this.conn = this.peer.connect(target);
                this.setupConn();
                
                this.updateContactList(target);
            },

            setupConn() {
                this.conn.on('data', (data) => {
                    this.renderMsg(data, 'in');
                });
                this.conn.on('open', () => {
                    this.renderMsg("Система: Безопасный канал открыт", "in");
                });
            },

            send() {
                const input = document.getElementById('messageInput');
                const txt = input.value.trim();
                if(!txt || !this.conn) return;

                this.conn.send(txt);
                this.renderMsg(txt, 'out');
                input.value = '';
            },

            renderMsg(txt, type) {
                const container = document.getElementById('messages');
                const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const div = document.createElement('div');
                div.className = `msg ${type}`;
                div.innerHTML = `<div>${txt}</div><div class="msg-time">${time}</div>`;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            },

            updateContactList(id) {
                const list = document.getElementById('contactList');
                list.innerHTML = `<div class="contact-item active"><b>${id}</b></div>`;
            }
        };

        // Отправка по Enter
        document.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') core.send();
        });
    </script>
</body>
</html>
