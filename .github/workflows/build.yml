name: Build

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build-exe:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pywebview pyinstaller
      - run: pyinstaller --onefile --noconsole --name SecureMessenger client.py
      - uses: actions/upload-artifact@v4
        with:
          name: SecureMessenger-Windows
          path: dist\SecureMessenger.exe

  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Установка официального инструмента Google
        run: npm install -g @bubblewrap/cli

      - name: Сборка APK
        run: |
          bubblewrap init --url https://твой-сервер.com --name SecureMessenger --package com.securemessenger
          bubblewrap build --skipSigning --skipPwaValidation

      - uses: actions/upload-artifact@v4
        with:
          name: SecureMessenger-Android
          path: *.apk
