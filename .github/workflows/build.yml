name: Build EXE + APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      server_url:
        description: 'URL сервера мессенджера'
        required: true
        default: 'https://your-server.com'

permissions:
  contents: write

env:
  SERVER_URL: ${{ github.event.inputs.server_url || 'https://your-server.com' }}

jobs:

  # ══════════ СБОРКА EXE (Windows) ══════════
  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pywebview pyinstaller

      - name: Obfuscate code
        run: |
          python -c "
          import py_compile, compileall
          compileall.compile_dir('.', force=True)
          "

      - name: Build EXE
        run: |
          python -c "
          # Подставляем URL сервера
          with open('client.py','r') as f: code = f.read()
          code = code.replace('http://localhost:5000','${{ env.SERVER_URL }}')
          with open('client.py','w') as f: f.write(code)
          "
          pyinstaller --onefile --noconsole ^
            --name SecureMessenger ^
            --icon NONE ^
            --add-data "client.py;." ^
            client.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: SecureMessenger-Windows
          path: dist/SecureMessenger.exe

  # ══════════ СБОРКА APK (Android) ══════════
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create mobile app
        run: |
          cat > main.py << 'MOBILE_EOF'
          from kivy.app import App
          from kivy.uix.boxlayout import BoxLayout
          from kivy.uix.label import Label
          from kivy.clock import Clock
          from kivy.utils import platform
          import os, certifi

          SERVER = os.environ.get('SM_SERVER', '${{ env.SERVER_URL }}')

          class SecureMessengerApp(App):
              def build(self):
                  self.title = 'SecureMessenger'
                  layout = BoxLayout(orientation='vertical')
                  layout.add_widget(Label(text='Загрузка...'))
                  Clock.schedule_once(self.open_messenger, 1)
                  return layout

              def open_messenger(self, dt):
                  if platform == 'android':
                      from jnius import autoclass
                      Intent = autoclass('android.content.Intent')
                      Uri = autoclass('android.net.Uri')
                      PythonActivity = autoclass('org.kivy.android.PythonActivity')
                      intent = Intent(Intent.ACTION_VIEW, Uri.parse(SERVER))
                      currentActivity = PythonActivity.mActivity
                      currentActivity.startActivity(intent)
                  else:
                      import webbrowser
                      webbrowser.open(SERVER)

          if __name__ == '__main__':
              os.environ['SSL_CERT_FILE'] = certifi.where()
              SecureMessengerApp().run()
          MOBILE_EOF

      - name: Install Buildozer
        run: |
          pip install buildozer cython
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git python3-dev \
            ffmpeg libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev \
            zlib1g-dev libgstreamer1.0 \
            gstreamer1.0-plugins-base \
            libunwind-dev lld \
            autoconf automake libtool \
            openjdk-17-jdk unzip zip

      - name: Build APK
        run: |
          buildozer android debug 2>&1 | tail -50

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SecureMessenger-Android
          path: bin/*.apk

  # ══════════ РЕЛИЗ ══════════
  release:
    needs: [build-exe, build-apk]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            SecureMessenger-Windows/SecureMessenger.exe
            SecureMessenger-Android/*.apk
          body: |
            ## 🔐 SecureMessenger
            ### Скачать:
            - 🖥️ **Windows**: SecureMessenger.exe
            - 📱 **Android**: SecureMessenger.apk
          draft: false
          prerelease: false
