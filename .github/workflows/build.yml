name: Build

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build-exe:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install pywebview pyinstaller
      - name: Build EXE
        run: pyinstaller --onefile --noconsole --name SecureMessenger client.py
      - uses: actions/upload-artifact@v4
        with:
          name: SecureMessenger-Windows
          path: dist\SecureMessenger.exe

  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create mobile files
        run: |
          cat > main.py << 'EOF'
          from kivy.app import App
          from kivy.uix.label import Label
          from kivy.utils import platform
          from kivy.clock import Clock

          class MessengerApp(App):
              def build(self):
                  self.lbl = Label(text='SecureMessenger\nLoading...')
                  Clock.schedule_once(self.go, 2)
                  return self.lbl
              def go(self, dt):
                  url = 'https://your-server.com'
                  if platform == 'android':
                      from jnius import autoclass
                      Intent = autoclass('android.content.Intent')
                      Uri = autoclass('android.net.Uri')
                      PA = autoclass('org.kivy.android.PythonActivity')
                      PA.mActivity.startActivity(Intent(Intent.ACTION_VIEW, Uri.parse(url)))
                  else:
                      import webbrowser
                      webbrowser.open(url)
          if __name__ == '__main__':
              MessengerApp().run()
          EOF

          cat > buildozer.spec << 'SPEC'
          [app]
          title = SecureMessenger
          package.name = securemsg
          package.domain = com.sm
          source.dir = .
          source.include_exts = py
          version = 1.0
          requirements = python3,kivy,android,jnius
          android.permissions = INTERNET
          android.api = 33
          android.minapi = 21
          android.archs = arm64-v8a
          orientation = portrait
          fullscreen = 0
          [buildozer]
          log_level = 2
          SPEC

      - name: Build APK
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug

      - uses: actions/upload-artifact@v4
        with:
          name: SecureMessenger-Android
          path: bin/*.apk
