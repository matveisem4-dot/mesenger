name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-exe:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: pip install pywebview pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --noconsole --name SecureMessenger client.py

      - uses: actions/upload-artifact@v4
        with:
          name: SecureMessenger-Windows
          path: dist\SecureMessenger.exe
