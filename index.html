<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ghost-Net Public Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        body { background: #0b141a; color: #e9edef; font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        #auth-layer { position: fixed; inset: 0; background: #111b21; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        input, button { padding: 12px; border-radius: 8px; border: none; background: #2a3942; color: white; }
        button { background: #00a884; font-weight: bold; cursor: pointer; }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        #ms { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .m { align-self: flex-end; background: #005c4b; padding: 10px; border-radius: 8px; }
        .t { align-self: flex-start; background: #202c33; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div id="auth-layer">
    <h3>GhostID System</h3>
    <input type="password" id="_tk" placeholder="Token">
    <input type="text" id="_id" placeholder="Your ID">
    <input type="password" id="_ps" placeholder="Encrypt Pass">
    <button onclick="_start()">Connect</button>
</div>

<div class="chat-area">
    <div id="ms"></div>
    <div style="padding: 10px; background: #202c33; display: flex; gap: 10px;">
        <input type="text" id="_target" placeholder="Friend ID" style="width: 80px;">
        <input type="text" id="_msg" placeholder="Message..." style="flex: 1;">
        <button onclick="_send()">➤</button>
    </div>
</div>

<script>
    // Обфусцированные переменные
    let _a, _b, _c, _d, _room = 'main', _p;

    async function _start() {
        _a = document.getElementById('_tk').value;
        _b = document.getElementById('_id').value;
        _c = document.getElementById('_ps').value;
        _d = window.location.pathname.split('/').slice(1, 3).join('/');
        
        _p = new Peer(_b);
        document.getElementById('auth-layer').style.display = 'none';
        
        setInterval(_load, 4000);
    }

    // Запутанная функция отправки
    async function _send() {
        const _text = document.getElementById('_msg').value;
        const _data = JSON.stringify({ s: _b, t: _text, r: _room, ts: Date.now() });
        const _e = CryptoJS.AES.encrypt(_data, _c).toString();

        await fetch(`https://api.github.com/repos/${_d}/issues/1/comments`, {
            method: 'POST',
            headers: { 'Authorization': `token ${_a}` },
            body: JSON.stringify({ body: `v1:${_room}:${_e}` })
        });
        document.getElementById('_msg').value = '';
        _load();
    }

    async function _load() {
        const _r = await fetch(`https://api.github.com/repos/${_d}/issues/1/comments`, {
            headers: { 'Authorization': `token ${_a}` }
        });
        const _items = await _r.json();
        const _box = document.getElementById('ms');
        _box.innerHTML = '';

        _items.forEach(_i => {
            if(_i.body.startsWith(`v1:${_room}:`)) {
                try {
                    const _raw = _i.body.split(`v1:${_room}:`)[1];
                    const _dec = JSON.parse(CryptoJS.AES.decrypt(_raw, _c).toString(CryptoJS.enc.Utf8));
                    const _div = document.createElement('div');
                    _div.className = _dec.s === _b ? 'm' : 't';
                    _div.innerHTML = `<small style="opacity:0.5">${_dec.s}</small><br>${_dec.t}`;
                    _box.appendChild(_div);
                } catch(e){}
            }
        });
        _box.scrollTop = _box.scrollHeight;
    }
</script>
</body>
</html>
