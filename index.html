<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostNet Messenger</title>
    <style>
        /* Обнуляем всё, чтобы не было пустых полей по бокам */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #0b0e11; /* Темный фон мессенджера */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Чтобы не было двойной прокрутки */
        }

        /* ГЛАВНЫЙ КОНТЕЙНЕР: подстраивается под любой экран */
        .app-container {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
            max-width: 100%;
            max-height: 100%;
            position: relative;
        }

        /* ШАПКА (Header) */
        header {
            height: 60px;
            background-color: #15191c;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid #2d3339;
            flex-shrink: 0;
        }

        /* ОБЛАСТЬ ЧАТА: занимает всё свободное место */
        .chat-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* ПРИМЕР СООБЩЕНИЯ: подстраивается по ширине */
        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 16px;
            line-height: 1.4;
        }

        .sent {
            align-self: flex-end;
            background-color: #007bff;
        }

        .received {
            align-self: flex-start;
            background-color: #2d3339;
        }

        /* ПОЛЕ ВВОДА: всегда внизу */
        footer {
            height: 70px;
            background-color: #15191c;
            padding: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 1px solid #2d3339;
            flex-shrink: 0;
        }

        input {
            flex-grow: 1;
            height: 40px;
            border-radius: 20px;
            border: none;
            background-color: #2d3339;
            color: white;
            padding: 0 15px;
            outline: none;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        /* АДАПТИВНОСТЬ для больших экранов (ПК) */
        @media (min-width: 1024px) {
            .chat-area {
                width: 60%; /* На ПК чат не на весь экран, чтобы не было "расплющено" */
                margin: 0 auto;
            }
            footer {
                width: 60%;
                margin: 0 auto;
                background: none;
                border: none;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h2>GhostNet</h2>
        </header>

        <div class="chat-area">
            <div class="message received">Здарова! Это GhostNet.</div>
            <div class="message sent">Теперь всё подстраивается под экран?</div>
            <div class="message received">Да, и на ПК, и на мобиле будет чётко.</div>
        </div>

        <footer>
            <input type="text" placeholder="Напишите сообщение...">
            <button>Отправить</button>
        </footer>
    </div>

</body>
</html>
