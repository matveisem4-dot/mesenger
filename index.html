<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONYX - P2P Messenger</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.6;
        }

        .container {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            flex-direction: column;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 1px solid #0f3460;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(15, 52, 96, 0.5);
        }

        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            margin-bottom: 10px;
        }

        .connection-panel {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .panel {
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            border: 1px solid #00ffff;
            border-radius: 10px;
            padding: 20px;
            flex: 1;
            min-width: 300px;
            box-shadow: 0 4px 20px rgba(0, 255, 255, 0.2);
        }

        .panel h3 {
            color: #00ffff;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        input, button, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #00ffff;
            border-radius: 5px;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #ff00ff;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }

        button {
            background: linear-gradient(45deg, #0f3460, #16213e);
            color: #00ffff;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover {
            background: linear-gradient(45deg, #16213e, #0f3460);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .chat-container {
            display: flex;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        .messages-panel {
            flex: 2;
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex: 1;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #0f3460;
            border-radius: 10px;
            padding: 20px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .message {
            margin: 10px 0;
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid #00ffff;
            background: rgba(15, 52, 96, 0.3);
            animation: slideIn 0.3s ease;
        }

        .message.own {
            border-left-color: #ff00ff;
            background: rgba(255, 0, 255, 0.1);
            text-align: right;
        }

        .message-header {
            font-size: 0.9em;
            color: #00ffff;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .message-content {
            word-wrap: break-word;
            line-height: 1.4;
        }

        .message-input {
            display: flex;
            gap: 10px;
        }

        .message-input textarea {
            flex: 1;
            resize: none;
            min-height: 50px;
        }

        .peers-panel {
            flex: 1;
            max-width: 300px;
        }

        .peer-list {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #0f3460;
            border-radius: 10px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .peer-item {
            padding: 10px;
            margin: 5px 0;
            background: rgba(15, 52, 96, 0.3);
            border-radius: 5px;
            border: 1px solid #00ffff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .peer-item:hover {
            background: rgba(0, 255, 255, 0.1);
            transform: translateX(5px);
        }

        .peer-item.connected {
            border-color: #00ff00;
            background: rgba(0, 255, 0, 0.1);
        }

        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
        }

        .status.connected {
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid #00ff00;
            color: #00ff00;
        }

        .status.connecting {
            background: rgba(255, 255, 0, 0.2);
            border: 1px solid #ffff00;
            color: #ffff00;
        }

        .status.disconnected {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff0000;
            color: #ff0000;
        }

        .file-share-panel {
            margin-top: 20px;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin: 5px 0;
            background: rgba(15, 52, 96, 0.3);
            border-radius: 5px;
            border: 1px solid #00ffff;
        }

        .file-progress {
            width: 100%;
            height: 4px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 5px;
        }

        .file-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #00ffff, #ff00ff);
            transition: width 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .encryption-info {
            font-size: 0.8em;
            color: #00ff00;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .chat-container {
                flex-direction: column;
            }
            
            .peers-panel {
                max-width: 100%;
            }
            
            .connection-panel {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    
    <div class="container">
        <div class="header">
            <h1>ONYX</h1>
            <p>P2P Encrypted Messenger</p>
        </div>

        <div class="connection-panel">
            <div class="panel">
                <h3>Your Identity</h3>
                <div id="status" class="status disconnected">Disconnected</div>
                <input type="text" id="peerId" placeholder="Your ID will appear here" readonly>
                <button id="startBtn">Start ONYX</button>
                <button id="copyIdBtn" disabled>Copy Your ID</button>
            </div>
            
            <div class="panel">
                <h3>Connect to Peer</h3>
                <input type="text" id="remotePeerId" placeholder="Enter peer ID to connect">
                <button id="connectBtn" disabled>Connect</button>
                <div class="encryption-info">🔒 AES-GCM Encryption Active</div>
            </div>
        </div>

        <div class="chat-container">
            <div class="messages-panel">
                <div class="messages" id="messages"></div>
                <div class="message-input">
                    <textarea id="messageInput" placeholder="Type your encrypted message here..." disabled></textarea>
                    <button id="sendBtn" disabled>Send</button>
                </div>
            </div>
            
            <div class="peers-panel">
                <div class="panel">
                    <h3>Connected Peers</h3>
                    <div class="peer-list" id="peerList">
                        <p style="color: #666; text-align: center;">No peers connected</p>
                    </div>
                </div>
                
                <div class="panel file-share-panel">
                    <h3>File Sharing</h3>
                    <input type="file" id="fileInput" multiple disabled>
                    <button id="sendFileBtn" disabled>Send Files</button>
                    <div id="fileList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Particle Background
        class ParticleBackground {
            constructor() {
                this.canvas = document.getElementById('particleCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.init();
                this.animate();
            }

            init() {
                this.resize();
                window.addEventListener('resize', () => this.resize());
                
                for (let i = 0; i < 100; i++) {
                    this.particles.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        vx: (Math.random() - 0.5) * 0.5,
                        vy: (Math.random() - 0.5) * 0.5,
                        size: Math.random() * 2 + 1,
                        color: Math.random() > 0.5 ? '#00ffff' : '#ff00ff'
                    });
                }
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            animate() {
                this.ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                this.particles.forEach(particle => {
                    particle.x += particle.vx;
                    particle.y += particle.vy;

                    if (particle.x < 0 || particle.x > this.canvas.width) particle.vx *= -1;
                    if (particle.y < 0 || particle.y > this.canvas.height) particle.vy *= -1;

                    this.ctx.beginPath();
                    this.ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                    this.ctx.fillStyle = particle.color;
                    this.ctx.fill();
                });

                // Draw connections
                this.particles.forEach((p1, i) => {
                    this.particles.slice(i + 1).forEach(p2 => {
                        const distance = Math.sqrt((p1.x - p2.x) ** 2 + (p1.y - p2.y) ** 2);
                        if (distance < 100) {
                            this.ctx.beginPath();
                            this.ctx.moveTo(p1.x, p1.y);
                            this.ctx.lineTo(p2.x, p2.y);
                            this.ctx.strokeStyle = `rgba(0, 255, 255, ${1 - distance / 100})`;
                            this.ctx.stroke();
                        }
                    });
                });

                requestAnimationFrame(() => this.animate());
            }
        }

        // AES-GCM Encryption
        class AESEncryption {
            constructor() {
                this.key = null;
                this.init();
            }

            async init() {
                this.key = await crypto.subtle.generateKey(
                    { name: 'AES-GCM', length: 256 },
                    true,
                    ['encrypt', 'decrypt']
                );
            }

            async encrypt(text) {
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const encoded = new TextEncoder().encode(text);
                const encrypted = await crypto.subtle.encrypt(
                    { name: 'AES-GCM', iv },
                    this.key,
                    encoded
                );
                
                return {
                    encrypted: Array.from(new Uint8Array(encrypted)),
                    iv: Array.from(iv)
                };
            }

            async decrypt(encryptedData) {
                const { encrypted, iv } = encryptedData;
                const decrypted = await crypto.subtle.decrypt(
                    { name: 'AES-GCM', iv: new Uint8Array(iv) },
                    this.key,
                    new Uint8Array(encrypted)
                );
                
                return new TextDecoder().decode(decrypted);
            }

            async exportKey() {
                return await crypto.subtle.exportKey('jwk', this.key);
            }

            async importKey(keyData) {
                this.key = await crypto.subtle.importKey(
                    'jwk',
                    keyData,
                    { name: 'AES-GCM' },
                    true,
                    ['encrypt', 'decrypt']
                );
            }
        }

        // ONYX Messenger
        class OnyxMessenger {
            constructor() {
                this.peer = null;
                this.connections = new Map();
                this.encryption = new AESEncryption();
                this.fileTransfers = new Map();
                this.init();
            }

            async init() {
                new ParticleBackground();
                this.setupEventListeners();
            }

            setupEventListeners() {
                document.getElementById('startBtn').addEventListener('click', () => this.start());
                document.getElementById('connectBtn').addEventListener('click', () => this.connect());
                document.getElementById('sendBtn').addEventListener('click', () => this.sendMessage());
                document.getElementById('copyIdBtn').addEventListener('click', () => this.copyId());
                document.getElementById('sendFileBtn').addEventListener('click', () => this.sendFiles());
                
                document.getElementById('messageInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        this.sendMessage();
                    }
                });
            }

            async start() {
                try {
                    // Fetch with bypass header before starting PeerJS
                    await fetch('https://my-mesh-node.serveo.net', {
                        headers: { 'Bypass-Tunnel-Reminder': 'true' }
                    });

                    this.updateStatus('connecting');
                    
                    this.peer = new Peer({
                        host: 'my-mesh-node.serveo.net',
                        port: 443,
                        path: '/',
                        secure: true
                    });

                    this.peer.on('open', (id) => {
                        document.getElementById('peerId').value = id;
                        document.getElementById('startBtn').textContent = 'ONYX Active';
                        document.getElementById('startBtn').disabled = true;
                        document.getElementById('connectBtn').disabled = false;
                        document.getElementById('copyIdBtn').disabled = false;
                        this.updateStatus('connected');
                        this.addMessage('System', 'ONYX messenger started successfully', 'system');
                    });

                    this.peer.on('connection', (conn) => {
                        this.handleConnection(conn);
                    });

                    this.peer.on('error', (err) => {
                        this.updateStatus('disconnected');
                        this.addMessage('System', `Connection error: ${err.type}`, 'error');
                    });

                } catch (error) {
                    this.updateStatus('disconnected');
                    this.addMessage('System', `Failed to start ONYX: ${error.message}`, 'error');
                }
            }

            connect() {
                const remoteId = document.getElementById('remotePeerId').value.trim();
                if (!remoteId) {
                    this.addMessage('System', 'Please enter a valid peer ID', 'error');
                    return;
                }

                try {
                    const conn = this.peer.connect(remoteId);
                    this.handleConnection(conn);
                    this.addMessage('System', `Connecting to ${remoteId}...`, 'info');
                } catch (error) {
                    this.addMessage('System', `Connection failed: ${error.message}`, 'error');
                }
            }

            handleConnection(conn) {
                const peerId = conn.peer;
                
                conn.on('open', () => {
                    this.connections.set(peerId, conn);
                    this.updatePeerList();
                    this.addMessage('System', `Connected to ${peerId}`, 'success');
                    this.enableChat();
                    
                    // Exchange encryption keys
                    this.encryption.exportKey().then(key => {
                        conn.send({ type: 'key_exchange', key });
                    });
                });

                conn.on('data', async (data) => {
                    if (data.type === 'key_exchange') {
                        await this.encryption.importKey(data.key);
                        this.addMessage('System', `Encryption key exchanged with ${peerId}`, 'success');
                    } else if (data.type === 'message') {
                        try {
                            const decrypted = await this.encryption.decrypt(data.content);
                            this.addMessage(peerId, decrypted, 'received');
                        } catch (error) {
                            this.addMessage('System', `Failed to decrypt message from ${peerId}`, 'error');
                        }
                    } else if (data.type === 'file') {
                        this.handleFileReceive(peerId, data);
                    }
                });

                conn.on('close', () => {
                    this.connections.delete(peerId);
                    this.updatePeerList();
                    this.addMessage('System', `Disconnected from ${peerId}`, 'info');
                    if (this.connections.size === 0) {
                        this.disableChat();
                    }
                });

                conn.on('error', (err) => {
                    this.addMessage('System', `Connection error with ${peerId}: ${err.type}`, 'error');
                });
            }

            async sendMessage() {
                const input = document.getElementById('messageInput');
                const message = input.value.trim();
                
                if (!message) return;

                try {
                    const encrypted = await this.encryption.encrypt(message);
                    
                    this.connections.forEach(conn => {
                        conn.send({
                            type: 'message',
                            content: encrypted
                        });
                    });

                    this.addMessage('You', message, 'sent');
                    input.value = '';
                } catch (error) {
                    this.addMessage('System', `Failed to send message: ${error.message}`, 'error');
                }
            }

            sendFiles() {
                const fileInput = document.getElementById('fileInput');
                const files = fileInput.files;
                
                if (files.length === 0) {
                    this.addMessage('System', 'Please select files to send', 'error');
                    return;
                }

                Array.from(files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const fileData = {
                            type: 'file',
                            name: file.name,
                            size: file.size,
                            data: Array.from(new Uint8Array(e.target.result))
                        };

                        this.connections.forEach(conn => {
                            conn.send(fileData);
                        });

                        this.addMessage('System', `Sent file: ${file.name}`, 'success');
                        this.addFileToList(file.name, file.size, 'sent');
                    };
                    reader.readAsArrayBuffer(file);
                });

                fileInput.value = '';
            }

            handleFileReceive(peerId, fileData) {
                const { name, size, data } = fileData;
                const blob = new Blob([new Uint8Array(data)]);
                const url = URL.createObjectURL(blob);
                
                this.addMessage('System', `Received file: ${name} from ${peerId}`, 'success');
                this.addFileToList(name, size, 'received', url);
            }

            addFileToList(name, size, type, url = null) {
                const fileList = document.getElementById('fileList');
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                
                const sizeText = (size / 1024).toFixed(2) + ' KB';
                
                if (url) {
                    fileItem.innerHTML = `
                        <span>${name} (${sizeText})</span>
                        <a href="${url}" download="${name}" style="color: #00ffff; text-decoration: none;">Download</a>
                    `;
                } else {
                    fileItem.innerHTML = `
                        <span>${name} (${sizeText})</span>
                        <span style="color: #ff00ff;">Sent</span>
                    `;
                }
                
                fileList.appendChild(fileItem);
            }

            addMessage(sender, content, type) {
                const messages = document.getElementById('messages');
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${type === 'sent' ? 'own' : ''}`;
                
                const time = new Date().toLocaleTimeString();
                messageDiv.innerHTML = `
                    <div class="message-header">${sender} - ${time}</div>
                    <div class="message-content">${content}</div>
                `;
                
                messages.appendChild(messageDiv);
                messages.scrollTop = messages.scrollHeight;
            }

            updatePeerList() {
                const peerList = document.getElementById('peerList');
                
                if (this.connections.size === 0) {
                    peerList.innerHTML = '<p style="color: #666; text-align: center;">No peers connected</p>';
                    return;
                }

                peerList.innerHTML = '';
                this.connections.forEach((conn, peerId) => {
                    const peerItem = document.createElement('div');
                    peerItem.className = 'peer-item connected';
                    peerItem.textContent = peerId;
                    peerItem.addEventListener('click', () => {
                        document.getElementById('remotePeerId').value = peerId;
                    });
                    peerList.appendChild(peerItem);
                });
            }

            updateStatus(status) {
                const statusElement = document.getElementById('status');
                statusElement.className = `status ${status}`;
                
                switch(status) {
                    case 'connected':
                        statusElement.textContent = 'Connected to ONYX Network';
                        break;
                    case 'connecting':
                        statusElement.textContent = 'Connecting...';
                        break;
                    case 'disconnected':
                        statusElement.textContent = 'Disconnected';
                        break;
                }
            }

            enableChat() {
                document.getElementById('messageInput').disabled = false;
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('fileInput').disabled = false;
                document.getElementById('sendFileBtn').disabled = false;
            }

            disableChat() {
                document.getElementById('messageInput').disabled = true;
                document.getElementById('sendBtn').disabled = true;
                document.getElementById('fileInput').disabled = true;
                document.getElementById('sendFileBtn').disabled = true;
            }

            copyId() {
                const peerId = document.getElementById('peerId').value;
                navigator.clipboard.writeText(peerId).then(() => {
                    this.addMessage('System', 'Peer ID copied to clipboard', 'success');
                });
            }
        }

        // Initialize ONYX Messenger
        const onyx = new OnyxMessenger();
    </script>
</body>
</html>
